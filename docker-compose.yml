version: "3.9"

services:
  app:
    build: .
    container_name: guidebook_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: guidebook_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_now}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-guidebook_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change_me_now}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
